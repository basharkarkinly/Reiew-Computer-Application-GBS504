<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBS504 — تطبيقات حاسوبية | Support Channel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@100;200;300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#10192B;
  --ink-2:#182338;
  --ink-3:#233252;
  --paper:#F4EEDF;
  --paper-2:#EBE3CE;
  --brass:#CB9F45;
  --brass-deep:#96702A;
  --teal:#3C7B70;
  --teal-deep:#265A51;
  --danger:#B4483F;
  --success:#3C7B58;
  --ink-text:#1B2436;
  --muted:#5B6478;
  --card-shadow: 0 18px 40px -20px rgba(16,25,43,.55);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--ink);
  background-image:
    radial-gradient(1200px 800px at 85% -10%, rgba(203,159,69,.10), transparent 60%),
    radial-gradient(900px 700px at 0% 100%, rgba(60,123,112,.12), transparent 55%);
  color:var(--paper);
  font-family:'Alexandria',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.disp{font-family:'Alexandria Text',serif;font-weight:700;}
.mono{font-family:'IBM Plex Mono',monospace;direction:ltr;unicode-bidi:embed;display:inline-block;}
a{color:inherit;}
::selection{background:var(--brass);color:var(--ink);}

/* ---------- layout ---------- */
.app{display:grid;grid-template-columns:290px 1fr;min-height:100vh;}
@media (max-width:900px){.app{grid-template-columns:1fr;}}

.sidebar{
  background:linear-gradient(180deg,var(--ink-2),var(--ink));
  border-left:1px solid rgba(203,159,69,.18);
  padding:28px 22px 30px;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
@media (max-width:900px){.sidebar{position:relative;height:auto;border-left:none;border-bottom:1px solid rgba(203,159,69,.18);}}

.brand{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.brand-mark{
  width:44px;height:44px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--brass), var(--brass-deep) 70%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Markazi Text',serif;font-weight:700;font-size:20px;color:var(--ink);
  box-shadow:0 6px 14px -4px rgba(0,0,0,.5);
  flex-shrink:0;
}
.brand-name{font-size:13px;color:var(--brass);letter-spacing:.5px;font-weight:700;}
.brand-course{font-size:22px;color:var(--paper);margin-top:2px;}
.brand-sub{font-size:12.5px;color:var(--muted);margin-top:2px;}

.progress-wrap{margin:22px 0 26px;}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px;}
.progress-bar{height:8px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--brass));border-radius:6px;transition:width .5s ease;}

nav.navlist{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.nav-section-label{font-size:11px;color:var(--muted);letter-spacing:1px;margin:16px 4px 6px;text-transform:uppercase;}
.navitem{
  display:flex;align-items:center;gap:12px;
  padding:11px 12px;border-radius:10px;cursor:pointer;
  color:var(--paper-2);font-size:14.5px;font-weight:600;
  border:1px solid transparent;
  transition:background .15s, border-color .15s;
  position:relative;
}
.navitem:hover{background:rgba(255,255,255,.05);}
.navitem.active{background:rgba(203,159,69,.14);border-color:rgba(203,159,69,.35);color:var(--brass);}
.nav-num{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Markazi Text',serif;font-size:14px;font-weight:700;
  background:rgba(255,255,255,.08);color:var(--paper-2);
}
.navitem.active .nav-num{background:var(--brass);color:var(--ink);}
.nav-seal{
  margin-right:auto;width:18px;height:18px;border-radius:50%;
  border:2px solid var(--success);display:none;align-items:center;justify-content:center;
  font-size:10px;color:var(--success);flex-shrink:0;
}
.navitem.done .nav-seal{display:flex;}

.main{padding:34px 40px 80px;max-width:980px;}
@media (max-width:900px){.main{padding:22px 18px 60px;}}

.top-strip{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;flex-wrap:wrap;gap:10px;}
.crumb{font-size:13px;color:var(--muted);}
.crumb b{color:var(--brass);}

/* ---------- cards ---------- */
.card{
  background:var(--paper);color:var(--ink-text);
  border-radius:16px;
  box-shadow:var(--card-shadow);
  padding:30px 34px;
  margin-bottom:24px;
  position:relative;
  border:1px solid rgba(0,0,0,.04);
}
.card::before{
  content:"";position:absolute;top:0;bottom:0;right:14px;width:0;
  border-right:2px dashed rgba(150,112,42,.25);
}
.punch{position:absolute;top:26px;bottom:26px;right:-1px;width:1px;}
.punch span{
  position:absolute;right:-6px;width:12px;height:12px;border-radius:50%;
  background:var(--ink);box-shadow:inset 0 2px 3px rgba(0,0,0,.4);
}
@media (max-width:640px){.card{padding:24px 20px;}.card::before,.punch{display:none;}}

.hero-card{
  background:linear-gradient(135deg, var(--paper) 60%, var(--paper-2));
}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-size:12.5px;font-weight:700;color:var(--brass-deep);
  letter-spacing:.5px;margin-bottom:10px;
}
.eyebrow::before{content:"";width:22px;height:2px;background:var(--brass-deep);display:inline-block;}
h1.page-title{font-size:34px;margin:0 0 10px;color:var(--ink-text);}
p.lead{font-size:16px;line-height:1.9;color:var(--muted);margin:0;}

.stamp{
  position:absolute;left:26px;top:22px;
  width:78px;height:78px;border-radius:50%;
  border:3px solid var(--success);color:var(--success);
  display:none;align-items:center;justify-content:center;flex-direction:column;
  transform:rotate(-14deg);
  font-family:'Markazi Text',serif;font-weight:700;
  opacity:.9;
}
.stamp.show{display:flex;}
.stamp span{font-size:11px;letter-spacing:1px;}
.stamp b{font-size:16px;}

/* section content typography */
.sec h2{font-size:24px;color:var(--ink-text);margin:28px 0 12px;border-right:4px solid var(--brass);padding-right:12px;}
.sec h2:first-child{margin-top:0;}
.sec h3{font-size:18px;color:var(--brass-deep);margin:20px 0 8px;}
.sec p, .sec li{font-size:15.5px;line-height:1.95;color:var(--ink-text);}
.sec ul{padding-right:22px;margin:10px 0;}
.sec ul li{margin-bottom:6px;}
.sec .note{
  background:rgba(60,123,112,.08);border-right:3px solid var(--teal);
  padding:12px 16px;border-radius:8px;font-size:14.5px;color:var(--teal-deep);margin:14px 0;
}
.sec .warn{
  background:rgba(180,72,63,.08);border-right:3px solid var(--danger);
  padding:12px 16px;border-radius:8px;font-size:14.5px;color:#7A2F28;margin:14px 0;
}
table.ref{width:100%;border-collapse:collapse;margin:14px 0;font-size:14.5px;}
table.ref th,table.ref td{border:1px solid rgba(0,0,0,.12);padding:8px 10px;text-align:right;}
table.ref th{background:var(--paper-2);color:var(--brass-deep);}
table.ref td.mono{font-family:'IBM Plex Mono',monospace;direction:ltr;text-align:left;}

.chips{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0;}
.chip{
  background:var(--ink);color:var(--brass);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;
  font-family:'IBM Plex Mono',monospace;
}

/* ---------- buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--ink);color:var(--brass);
  border:none;border-radius:10px;padding:12px 22px;
  font-family:'Cairo',sans-serif;font-weight:700;font-size:14.5px;
  cursor:pointer;transition:transform .12s, box-shadow .12s;
  box-shadow:0 8px 18px -8px rgba(0,0,0,.5);
}
.btn:hover{transform:translateY(-1px);}
.btn.secondary{background:#f1f5f9;#1e293b;border:1px solid #cbd5e1;}
.btn.ghost{background:transparent;color:var(--brass-deep);border:2px solid var(--brass-deep);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px;}

/* ---------- quiz ---------- */
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.quiz-progress{font-size:13px;color:var(--muted);}
.q-counter{font-family:'IBM Plex Mono',monospace;color:var(--brass-deep);font-weight:600;}
.qcard{background:var(--paper);border-radius:14px;padding:26px 28px;box-shadow:var(--card-shadow);}
.qtag{display:inline-block;background:var(--ink);color:var(--brass);font-size:11.5px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:12px;}
.qtext{font-size:18px;font-weight:700;color:var(--ink-text);line-height:1.7;margin-bottom:18px;}
.qtext .mono{font-size:16px;}
.question-data{margin:12px 0 2px;font-size:14px;font-weight:500;}
.question-data table{border-collapse:collapse;direction:ltr;text-align:center;background:#fff;}
.question-data th,.question-data td{border:1px solid rgba(0,0,0,.18);padding:4px 9px;min-width:48px;}
.question-data th{background:var(--paper-2);color:var(--brass-deep);font-family:'IBM Plex Mono',monospace;}
.question-data .context-label{direction:rtl;text-align:right;font-size:13px;color:var(--muted);margin-bottom:6px;}
.options{display:flex;flex-direction:column;gap:10px;}
.opt{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;border-radius:10px;border:2px solid rgba(0,0,0,.1);
  cursor:pointer;font-size:15px;color:var(--ink-text);background:#fff;
  transition:border-color .12s, background .12s;
}
.opt:hover{border-color:var(--brass);}
.opt .bullet{width:22px;height:22px;border-radius:50%;border:2px solid var(--muted);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;}
.opt.correct{background:rgba(60,123,88,.12);border-color:var(--success);}
.opt.correct .bullet{border-color:var(--success);background:var(--success);color:#fff;}
.opt.wrong{background:rgba(180,72,63,.1);border-color:var(--danger);}
.opt.wrong .bullet{border-color:var(--danger);background:var(--danger);color:#fff;}
.opt.disabled{cursor:default;}
.numeric-row{display:flex;gap:10px;align-items:center;margin-top:6px;}
.numeric-row input{
  flex:1;padding:13px 16px;border-radius:10px;border:2px solid rgba(0,0,0,.15);
  font-family:'IBM Plex Mono',monospace;font-size:16px;text-align:center;direction:ltr;
}
.numeric-row input:focus{outline:none;border-color:var(--brass);}
.feedback{margin-top:16px;padding:14px 16px;border-radius:10px;font-size:14.5px;line-height:1.8;display:none;}
.feedback.show{display:block;}
.feedback.ok{background:rgba(60,123,88,.12);color:var(--teal-deep);border-right:3px solid var(--success);}
.feedback.bad{background:rgba(180,72,63,.1);color:#7A2F28;border-right:3px solid var(--danger);}
.explain-label{font-weight:700;}

.result-card{text-align:center;padding:40px 30px;}
.result-score{font-family:'Markazi Text',serif;font-size:64px;color:var(--brass-deep);line-height:1;}
.result-score span{font-size:26px;color:var(--muted);}
.result-msg{font-size:16px;color:var(--ink-text);margin:14px 0 6px;}

/* bank list */
.bank-item{border-bottom:1px solid rgba(0,0,0,.08);padding:16px 4px;}
.bank-q{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;cursor:pointer;}
.bank-q-text{font-size:15px;font-weight:600;color:var(--ink-text);line-height:1.7;}
.bank-idx{font-family:'IBM Plex Mono',monospace;color:var(--brass-deep);font-size:13px;flex-shrink:0;margin-top:2px;}
.bank-ans{display:none;margin-top:10px;font-size:14.5px;color:var(--teal-deep);background:rgba(60,123,112,.08);padding:10px 14px;border-radius:8px;}
.bank-ans.show{display:block;}
.bank-filter{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.filter-btn{
  border:2px solid rgba(0,0,0,.15);background:transparent;border-radius:20px;
  padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;color:var(--ink-text);
}
.filter-btn.active{background:var(--ink);color:var(--brass);border-color:var(--ink);}

.lock-card{text-align:center;padding:50px 30px;}
.lock-icon{font-size:44px;margin-bottom:14px;}

footer.foot{text-align:center;color:var(--muted);font-size:12.5px;padding:30px 0 10px;}
</style>

<script>
// ============ CHAPTER READING CONTENT ============
const CHAPTERS = [
{
  id:'ch1', num:1,
  title:'الحاسوب، أتمتة المكاتب، وتصنيف البرمجيات',
  short:'مقدمة عامة',
  html:`
  <div class="sec">
    <h2>١) تعريف الحاسوب ومزاياه</h2>
    <p><b>الحاسوب:</b> جهاز إلكتروني سريع يعالج بيانات الإدخال وفقاً لتعليمات المبرمج أو المستخدم، ويوفر المعلومات المطلوبة كخرج.</p>
    <ul>
      <li><b>السرعة</b> — يؤدي المهام الحسابية/المنطقية في ثواني.</li>
      <li><b>الدقة</b> — في إجراء العمليات الحسابية.</li>
      <li><b>الاجتهاد</b> — لا يتعب ولا يُرهق كالإنسان.</li>
      <li><b>الذاكرة الكبيرة.</b></li>
    </ul>
    <div class="warn"><b>العيب الرئيسي:</b> عدم الذكاء — فهو آلة وليس له ذكاء خاص به عكس الإنسان.</div>
    <h3>الأدوار الحيوية الثلاثة لأنظمة الحاسوب</h3>
    <ul><li>دعم العمليات التجارية</li><li>دعم اتخاذ القرارات الإدارية</li><li>دعم الميزة التنافسية الاستراتيجية</li></ul>

    <h2>٢) تصنيف الحواسيب</h2>
    <h3>من حيث النوع</h3>
    <ul>
      <li><b>تناظرية:</b> تقيس تغيّرات الظواهر الطبيعية (مثل قياس دقات القلب والحرارة).</li>
      <li><b>رقمية:</b> الأكثر استخداماً، تُنفّذ العمليات الحسابية والمنطقية.</li>
      <li><b>مختلطة:</b> تجمع الاثنين (الطب، الفضاء).</li>
    </ul>
    <h3>من حيث الحجم</h3>
    <ul><li>عملاقة (Super) — أشهرها "كيري"</li><li>كبيرة — مؤسسات حكومية وجامعات وبنوك</li><li>صغيرة — الحاسوب الشخصي</li></ul>
    <h3>من حيث الغرض</h3>
    <ul><li>عامة الأغراض — تشغّل مجموعة كبيرة من التطبيقات (كل الحواسيب الرقمية)</li><li>خاصة الأغراض — تطبيق واحد محدد (توجيه الطائرات، الصواريخ...)</li></ul>
    <p>يتألف نظام الحاسوب من: <b>وحدة الإدخال/الإخراج، وحدة المعالجة المركزية، وحدة الذاكرة.</b></p>

    <h2>٣) أتمتة المكاتب</h2>
    <p>متطلبات بيئة المكتب: تقليل تكلفة المصروفات الإدارية، زيادة كفاءة المهام المكتبية، تقديم أفضل خدمة للعملاء، توفير معلومات دقيقة للإدارة، أفضل وأسرع طريقة للاتصال.</p>
    <h3>الوظائف الأساسية لأتمتة أي مكتب</h3>
    <ul>
      <li><b>إنشاء المستندات</b> — آلات كاتبة، حواسيب، طابعات.</li>
      <li><b>معالجة المستندات</b> — معالج نصوص، نشر مكتبي.</li>
      <li><b>توزيع المستندات</b> — إصدار الوثائق وتحديد الجهة والوسيلة المناسبة.</li>
      <li><b>الأرشفة</b> — حفظ منظم للاستخدام اللاحق.</li>
    </ul>
    <div class="note">أربعة أنظمة أتمتة مكاتب: أنظمة إدارة المستندات، أنظمة الاتصالات، أنظمة المؤتمرات عن بعد، أنظمة الدعم.</div>

    <h2>٤) تصنيف البرمجيات</h2>
    <h3>١. برمجيات النظام</h3>
    <p>تتحكم بعمل الأجهزة وتساعد بالتنفيذ الفعّال لتطبيقات المستخدم. ثلاثة أنواع:</p>
    <ul>
      <li>برامج إدارة النظام (نظام التشغيل وبيئات التشغيل)</li>
      <li>برامج تطوير النظام (المترجمات ومولدات التطبيقات)</li>
      <li>أدوات برمجيات النظام (الأدوات المساعدة)</li>
    </ul>
    <table class="ref"><tr><th>النوع</th><th>الوظيفة</th></tr>
    <tr><td>المفسّر (Interpreter)</td><td>ينفّذ التعليمات تعليمة تلو تعليمة، لا يُنتج برنامج كائن منفصل</td></tr>
    <tr><td>المترجم (Compiler)</td><td>يترجم البرنامج المصدر كاملاً دفعة واحدة وينتج برنامج كائن</td></tr>
    <tr><td>المجمّع (Assembler)</td><td>يحوّل لغة الأسمبلي (رموز) إلى لغة الآلة</td></tr>
    </table>
    <p><b>الأدوات المساعدة (Utilities):</b> محرر النصوص Editor، مدير الملفات File Manager، المحمّل Loader، محدد الموقع Locator، الرابط Linker.</p>

    <h3>٢. برمجيات التطبيقات</h3>
    <p><b>ذات الأغراض العامة:</b> معالج النصوص، النشر المكتبي، الجداول الإلكترونية، إدارة قواعد البيانات (DBMS).</p>
    <p><b>ذات الأغراض الخاصة:</b> إدارة الأعمال (Payroll)، نظام المعلومات الإدارية MIS، نظام إدارة المكتبة، تطبيقات علمية (CAD/CAM, SPSS, SAS)، تطبيقات عبر الإنترنت.</p>
    <p><b>برامج مخصّصة:</b> تُطوَّر فردياً أو بطلب من منظمات مهنية متخصصة.</p>
  </div>`
},
{
  id:'ch2', num:2,
  title:'Excel — الدوال، المراجع، وتحليل البيانات',
  short:'الجزء العملي',
  html:`
  <div class="sec">
    <h2>١) أساسيات الخلية والملف</h2>
    <ul>
      <li><b>الخلية النشطة (Active Cell):</b> محاطة بإطار أسود سميك.</li>
      <li><b>شريط الصيغة:</b> يُظهر محتوى الخلية والعمليات الجارية فيها.</li>
      <li><b>مربع الاسم (Name Box):</b> يُظهر اسم/عنوان الخلية المحددة.</li>
      <li>خلية العمود A والسطر 5 تُسمّى <span class="mono">A5</span> — الحرف أولاً ثم رقم السطر.</li>
      <li><b>حفظ باسم</b> ≠ <b>حفظ</b>: "حفظ باسم" يُنشئ نسخة إضافية من الملف.</li>
      <li>تاريخ إكسل يبدأ في <span class="mono">1900/1/1</span> (يأخذ القيمة 1) وينتهي عام <span class="mono">9999</span>.</li>
    </ul>

    <h2>٢) المراجع (References) — سؤال امتحاني دائم</h2>
    <table class="ref">
      <tr><th>النوع</th><th>الشكل</th><th>عند النسخ/التعبئة التلقائية</th></tr>
      <tr><td>نسبي</td><td class="mono">A1</td><td>يتغيّر السطر والعمود</td></tr>
      <tr><td>مطلق</td><td class="mono">$A$1</td><td>لا يتغيّر أي منهما ($ قبل الحرف وقبل الرقم)</td></tr>
      <tr><td>مختلط</td><td class="mono">$A1 أو A$1</td><td>يتغيّر فقط ما لا تسبقه $</td></tr>
    </table>
    <div class="note">مثال: <span class="mono">$A$2+A1</span> — الجزء <span class="mono">A1</span> فقط نسبي، فيتغيّر عند النقل، بينما <span class="mono">$A$2</span> ثابت لا يتغيّر.</div>

    <h2>٣) رموز البحث والتصفية النصية</h2>
    <table class="ref">
      <tr><th>الرمز</th><th>الدلالة</th></tr>
      <tr><td class="mono">#</td><td>حروف وأرقام لا تتسع في الخلية</td></tr>
      <tr><td class="mono">*</td><td>حروف وأرقام مجهولة (بعدد غير محدد)</td></tr>
      <tr><td class="mono">?</td><td>حرف أو رقم مجهول واحد فقط</td></tr>
    </table>

    <h2>٤) قاعدة بيانات Excel — الشروط الواجب توافرها</h2>
    <ul>
      <li>السطر الأول لأسماء الحقول (Field Names) — كل اسم مميز.</li>
      <li>كل عمود يحتوي نفس نوع البيانات.</li>
      <li>عمود مستقل لكل نوع معلومة نريد الفرز أو البحث فيها.</li>
      <li>عدم ترك أعمدة أو أسطر فارغة ضمن القاعدة.</li>
      <li>عند وجود قاعدة بيانات وبيانات أخرى بنفس الورقة: نفصل بسطر وعمود فارغين.</li>
    </ul>
    <p>إدخال البيانات: مباشرة من لوحة المفاتيح، من نافذة نموذج (Form)، من قائمة منسدلة، أو باستخدام الصيغ للأعمدة المحسوبة.</p>
    <p><b>Data Validation:</b> تقييد نوع/قيمة البيانات المُدخلة + إظهار رسالة خطأ أو رسالة إرشادية.</p>

    <h2>٥) الفرز والتصفية</h2>
    <ul>
      <li><b>الفرز (Sort):</b> إعادة ترتيب الصفوف حسب محتوى عمود واحد أو أكثر — أمر Sort يظهر في قائمة Data.</li>
      <li><b>التصفية (Filter):</b> إظهار السجلات المطابقة لمعيار معين وإخفاء الباقي — أمر Filter يظهر في قائمة Data.</li>
      <li><b>التصفية المتقدمة:</b> تسمح بمعايير أكثر تعقيداً (أكثر من معيارين وعمود).</li>
    </ul>

    <h2>٦) الدوال الإحصائية الأساسية</h2>
    <table class="ref">
      <tr><th>الدالة</th><th>الوظيفة</th></tr>
      <tr><td class="mono">SUM</td><td>مجموع القيم — تتجاهل النص والقيم المنطقية إن لم تُذكر مباشرة كوسيط</td></tr>
      <tr><td class="mono">COUNT</td><td>عدد الخلايا التي تحتوي أرقاماً فقط</td></tr>
      <tr><td class="mono">COUNTA</td><td>عدد الخلايا غير الفارغة (أرقام + نص + منطقية)</td></tr>
      <tr><td class="mono">MIN / MAX</td><td>أصغر/أكبر قيمة رقمية (تتجاهل النص والمنطقية)</td></tr>
      <tr><td class="mono">MINA / MAXA</td><td>كالسابق لكن تُدخل القيم المنطقية (TRUE=1, FALSE=0) في الحساب</td></tr>
      <tr><td class="mono">AVERAGE</td><td>متوسط القيم الرقمية فقط</td></tr>
      <tr><td class="mono">AVERAGEA</td><td>متوسط كل الخلايا غير الفارغة (تُحسب المنطقية والنص كـ0)</td></tr>
      <tr><td class="mono">SUBTOTAL</td><td>مجموع فرعي — رقم الدالة 1-11 يشمل الصفوف المخفية، 101-111 يتجاهلها</td></tr>
      <tr><td class="mono">INT</td><td>القيمة الصحيحة للناتج دون كسور</td></tr>
      <tr><td class="mono">TODAY</td><td>تاريخ اليوم الحالي</td></tr>
    </table>
    <div class="note">في الدوال المنطقية: <b>TRUE = 1</b> و <b>FALSE = 0</b> عند إدخالها في عملية حسابية.</div>

    <h2>٧) ترتيب العمليات الحسابية (أولوية التنفيذ)</h2>
    <p class="mono" style="font-size:16px;display:block;text-align:center;background:var(--paper-2);padding:10px;border-radius:8px;">() → ^ → * / → + − → & (الضم) → المقارنة (= &lt; &gt;)</p>
    <p>الأقواس أولاً، ثم الرفع لقوة، ثم الضرب والقسمة، ثم الجمع والطرح، ثم عمليات الضمّ (&)، وأخيراً المقارنة.</p>

    <h2>٨) الدوال المالية</h2>
    <table class="ref">
      <tr><th>الدالة</th><th>الاستخدام</th><th>الصيغة</th></tr>
      <tr><td class="mono">PV</td><td>القيمة الحالية — جدوى استثمار طويل الأجل، القيمة الحالية للتدفقات النقدية</td><td class="mono">PV(rate;nper;pmt;fv;type)</td></tr>
      <tr><td class="mono">FV</td><td>القيمة المستقبلية لاستثمار معين، دفعات دورية ثابتة</td><td class="mono">FV(rate;nper;pmt;pv;type)</td></tr>
      <tr><td class="mono">NPV</td><td>صافي القيمة الحالية — ربحية استثمار بمعدل خصم + دفعات مستقبلية</td><td class="mono">NPV(rate;value1;value2;...)</td></tr>
    </table>
    <ul>
      <li><b>rate:</b> معدل الفائدة/الخصم لكل فترة زمنية.</li>
      <li><b>nper:</b> عدد الدفعات/العوائد الدورية.</li>
      <li><b>pmt:</b> قيمة الدفعة الدورية.</li>
      <li><b>type:</b> 0 = الاستحقاق بنهاية الفترة (الافتراضي)، 1 = بداية الفترة.</li>
    </ul>
    <div class="note"><b>الاستثمار مربح</b> إذا كانت صافي القيمة الحالية (NPV) له <b>أكبر من الصفر</b>. يمكن استخدام أداة <b>Seek Goal</b> مع NPV لتحديد تكلفة الاستثمار أو معدل الخصم الذي يجعله مربحاً.</div>

    <h2>٩) الأدوات التحليلية المتقدمة</h2>
    <ul>
      <li><b>الجداول المحورية PivotTable:</b> معلومات ملخّصة لحقول محددة من مصدر بيانات.</li>
      <li><b>خط الاتجاه (Trendline):</b> يُستخدم للتنبؤ بقيم مستقبلية؛ كلما اقترب <b>معامل التحديد R²</b> من الواحد (1) زاد الاعتماد على خط الاتجاه.</li>
      <li><b>Solver:</b> أداة إيجاد الحل الأمثل (أكبر ربح/أقل تكلفة) بتغيير قيم خلايا مرتبطة بخلية الهدف ضمن قيود محددة.</li>
      <li><b>تحليل ماذا-إذا (What-If):</b> تقييم بدائل الحل عبر سيناريوهات مختلفة يمكن حفظها بأداة إدارة السيناريو.</li>
      <li><b>تحليل الحساسية:</b> يوضّح مدى تأثّر الحل بتغيّرات طفيفة في متغيرات النموذج.</li>
      <li><b>Chart:</b> تمثيل البيانات بشكل رسوم بيانية.</li>
    </ul>
    <div class="warn">ملاحظة: برنامج Excel <b>يمكن</b> استخدامه (بأدوات كـ Solver) في تحليلات إدارية متعددة، لكنه <b>لا</b> يُستخدم كأداة إدارة مشروع مباشرة (كـ MS Project)، وبرمجيات الحل الأمثل (Optimization) وظيفتها إيجاد أفضل قيمة لدالة هدف — وليست مراقبة جدولة المشاريع الضخمة.</div>
  </div>`
},
{
  id:'ch3', num:3,
  title:'نظم إدارة قواعد البيانات (DBMS)',
  short:'المفاهيم الأساسية',
  html:`
  <div class="sec">
    <h2>١) قاعدة البيانات ونظام إدارتها</h2>
    <p><b>قاعدة البيانات:</b> مجموعة من البيانات أو المعلومات المتصلة ذات العلاقات المتبادلة، مخزّنة بطريقة نموذجية دون تكرار.</p>
    <p><b>نظام إدارة قواعد البيانات (DBMS):</b> حزمة برمجية جاهزة تمكّن من إنشاء قاعدة البيانات وإجراء التعديلات عليها، ومعالجة البيانات المخزنة للوصول إلى المعلومات المطلوبة.</p>
    <p><b>الغرض الرئيسي</b> لنظام قاعدة البيانات المحوسب: تخزين البيانات والسماح للمستخدم باسترجاعها وتحديثها حسب حاجته.</p>
    <div class="note">يتكون نظام المعلومات المؤتمت من: قاعدة البيانات + البرمجيات (DBMS) + التجهيزات المادية + المستخدمين.</div>

    <h2>٢) مفاهيم قواعد البيانات الترابطية</h2>
    <ul>
      <li><b>الرابطة (Relation):</b> الجدول — تتضمن مجموعة أسطر (سجلات).</li>
      <li><b>السجل (Record):</b> سطر واحد، ويتكون من مجموعة حقول (Fields).</li>
      <li><b>التكامل (Integrated):</b> توزيع بيانات النظام على عدة ملفات مع المحافظة على الترابط بينها بأقل تكرار وحشو.</li>
      <li><b>التشارك (Shared):</b> عنصر البيانات الواحد يُستخدم من قبل عدة مستخدمين في الوقت نفسه.</li>
    </ul>

    <h2>٣) وظائف ولغات نظام إدارة قواعد البيانات</h2>
    <p>أهم الوظائف: تعريف الروابط، معالجة البيانات، الاستعلام، ضمان حماية البيانات ونزاهتها، ضمان استعادة البيانات، قاموس البيانات.</p>
    <table class="ref">
      <tr><th>اللغة</th><th>الاختصار</th><th>الوظيفة</th></tr>
      <tr><td>لغة تعريف البيانات</td><td class="mono">DDL</td><td>تعريف وتوصيف الملفات والسجلات والحقول والعلاقات وشروط التكامل</td></tr>
      <tr><td>لغة معالجة البيانات</td><td class="mono">DML</td><td>إضافة/حذف/تعديل سجلات، فتح وإغلاق ملفات، دمج وربط الملفات</td></tr>
      <tr><td>لغة الاستعلام</td><td class="mono">SQL</td><td>استرجاع وتصنيف وترتيب مجموعات فرعية من البيانات للإجابة عن استعلام المستخدم</td></tr>
    </table>
    <div class="note"><b>قاموس البيانات (Data Dictionary):</b> يمكن فهمه على أنه قاعدة بيانات خاصة بالنظام نفسه (وليست بالمستخدم) — يخزّن مواصفات كل حقل من حقول قاعدة البيانات.</div>

    <h2>٤) مستويات تصميم قاعدة البيانات (الثلاثة)</h2>
    <table class="ref">
      <tr><th>المستوى</th><th>الوصف</th></tr>
      <tr><td><b>المنطقي (Logical)</b></td><td>بناء الجداول بما يتوافق مع حاجة كل المستخدمين إجمالاً؛ تحديد البيانات المطلوب تخزينها والعلاقات بين الملفات — أهم مرحلة عند بناء قاعدة البيانات.</td></tr>
      <tr><td><b>الفيزيائي (Physical)</b></td><td>الأقل تجريداً — تحديد أماكن التخزين والفهارس، وصف السجلات وحجمها، تشفير البيانات، الأنواع الداخلية للبيانات.</td></tr>
      <tr><td><b>الخارجي/المستخدم (External)</b></td><td>مستوى المستخدم المفرد (نهائي أو مبرمج) — يتطلب لغة معالجة بيانات (DML/SQL) لإجراء العمليات على الملفات.</td></tr>
    </table>
    <div class="note">التصميم المادي (Physical Design): تحويل تراكيب البيانات من نموذج البيانات إلى ملفات باستخدام لغة توصيف البيانات (DDL) — <b>وليس</b> التصميم المنطقي.</div>

    <h2>٥) مستخدمو قاعدة البيانات</h2>
    <ul>
      <li><b>مدير قاعدة البيانات (DBA):</b> يحدد المتطلبات، يوفر الأمن والحماية، يعيد تنظيم القاعدة، يحدد صلاحيات المستخدمين.</li>
      <li><b>مبرمجو التطبيقات:</b> يحوّلون التصميم إلى قاعدة فعلية، يصيغون نوافذ التخاطب والتقارير والنماذج.</li>
      <li><b>المستخدمون النهائيون:</b> يتحاورون مع النظام عبر البرامج أو لغات كـ SQL (SELECT, INSERT, UPDATE, DELETE).</li>
      <li><b>محلل النظم:</b> يحدد متطلبات المستخدم ويطوّر المواصفات المطلوبة لتحديد المطلوب من قاعدة البيانات.</li>
    </ul>

    <h2>٦) مزايا استخدام قواعد البيانات (مقابل نظم الملفات التقليدية)</h2>
    <ul>
      <li>استقلالية البرامج عن البيانات (تعديل الملفات لا يستوجب تعديل البرامج وبالعكس).</li>
      <li>ندرة التكرار، أمن وسرية عالية، تكامل عالي ومتناسق.</li>
      <li>سهولة الصيانة والاسترجاع، توفير نسخ احتياطية.</li>
      <li>تمثيل العلاقات المعقدة بسهولة، واجهات متعددة للمستخدم.</li>
    </ul>
    <div class="warn">مساوئ نظم الملفات التقليدية (قبل DBMS): تكرار وحشو في البيانات، الملفات تابعة لبرنامج التطبيق، صعوبة إضافة تطبيقات جديدة، الرقابة على البيانات من اختصاص البرنامج نفسه فقط.</div>
    <div class="note"><b>لا نستخدم قاعدة بيانات</b> إذا: كانت تكلفة الإعداد عالية نسبة لحجم المشروع، أو كانت البيانات بسيطة جداً، أو المشروع يحتاج سرعة استجابة قصوى، أو لا حاجة لبيئة متعددة المستخدمين.</div>

    <h2>٧) أنواع نظم قواعد البيانات</h2>
    <p>هرمية (Hierarchical) — شبكية (Network) — <b>ترابطية/علائقية (Relational)</b> وهي الأكثر انتشاراً واعتماداً في السوق، وتتميز بالبساطة والمرونة وسهولة العرض. تعتمد على مفهوم <b>الجداول والعلاقات</b>.</p>
  </div>`
},
{
  id:'ch4', num:4,
  title:'نماذج تصميم قواعد البيانات (ERD / REA)',
  short:'العلاقات والمفاتيح',
  html:`
  <div class="sec">
    <h2>١) المفاتيح — سؤال امتحاني متكرر</h2>
    <table class="ref">
      <tr><th>المفتاح</th><th>التعريف</th></tr>
      <tr><td><b>المفتاح الرئيسي (Primary Key)</b></td><td>حقل أو مجموعة حقول تُميّز كل سجل عن غيره؛ لا يتكرر ولا يُترك فارغاً (Null) — قاعدة الكيان المتكامل.</td></tr>
      <tr><td><b>المفاتيح المرشحة (Candidate Keys)</b></td><td>كل الحقول المؤهلة لتكون مفتاحاً رئيسياً، تُحدد في مرحلة التصميم.</td></tr>
      <tr><td><b>المفتاح الأجنبي (Foreign Key)</b></td><td>حقل في رابطة معينة يكون هو المفتاح الرئيسي في رابطة أخرى — يربط بها، وقيمه <b>يمكن أن تتكرر</b> حسب الحاجة.</td></tr>
    </table>

    <h2>٢) خصائص الرابطة (الجدول)</h2>
    <ul>
      <li>لا يجوز تكرار أحد الأسطر ضمن الرابطة.</li>
      <li>أسطر الرابطة غير مرتّبة — تغيير ترتيبها لا يغيّر طبيعتها.</li>
      <li>الصفات (الأعمدة) غير مرتبة، وقيمها <b>أحادية</b> (لا يجوز أكثر من قيمة بالحقل الواحد).</li>
      <li><b>درجة الرابطة</b> = عدد الأعمدة (الصفات) المكوّنة لها.</li>
    </ul>

    <h2>٣) أنواع العلاقات بين الجداول</h2>
    <table class="ref">
      <tr><th>النوع</th><th>الرمز</th><th>مثال</th></tr>
      <tr><td>واحد لواحد</td><td class="mono">1:1</td><td>Customer ↔ Account</td></tr>
      <tr><td>واحد لمتعدد</td><td class="mono">1:N</td><td>Department ↔ Employee (القسم يضم عدة عاملين، والعامل بقسم واحد)</td></tr>
      <tr><td>متعدد لمتعدد</td><td class="mono">M:N</td><td>Student ↔ Subject — تحتاج جدول وسيط</td></tr>
    </table>
    <div class="note">العلاقة بين جدولين تتم عبر: حقل <b>المفتاح الرئيسي</b> في الجدول الأول وحقل <b>المفتاح الأجنبي</b> في الجدول الثاني.</div>

    <h2>٤) العمليات على المجموعات (الروابط)</h2>
    <table class="ref">
      <tr><th>العملية</th><th>الشرط</th><th>النتيجة</th></tr>
      <tr><td>الاجتماع UNION</td><td>الرابطتان بنفس الأعمدة</td><td>رابطة جديدة تضم كل الأسطر (المشتركة + الباقي من كل رابطة)</td></tr>
      <tr><td>التقاطع INTERSECTION</td><td>نفس الأعمدة</td><td>الأسطر المشتركة فقط بين A و B</td></tr>
      <tr><td>الفرق A-B (DIFFERENCE)</td><td>نفس الأعمدة</td><td>الأسطر الموجودة في A وغير موجودة في B</td></tr>
    </table>
    <h3>العمليات الخاصة بالروابط</h3>
    <ul>
      <li><b>الوصل (Join):</b> دمج رابطتين لهما عمود مشترك في رابطة جديدة.</li>
      <li><b>الانتقاء (Restriction):</b> اختيار الأسطر التي تحقق شرطاً معيناً من رابطة موجودة.</li>
      <li><b>الإسقاط (Projection):</b> اختزال الرابطة لتحتوي فقط على الأعمدة (الصفات) المرغوبة.</li>
    </ul>

    <h2>٥) نموذج الكيان-العلاقة (ERM / ERD)</h2>
    <p>أقدم وأهم تقنية لتصميم وتوثيق قواعد البيانات — <b>Entity-Relationship Model</b>.</p>
    <ul>
      <li><b>الكيان (Entity):</b> شيء مادي أو مجرد له أهمية للمنظمة (عميل، منتج، عامل، حساب).</li>
      <li><b>العلاقات (Relationships):</b> الروابط المنطقية بين نماذج الكيانات.</li>
      <li><b>الصفات (Attributes):</b> مجموعة الخواص التي تصف الكيان.</li>
      <li><b>الظاهرة (Domain):</b> مجموعة القيم التي تأخذها صفة معينة.</li>
    </ul>
    <h3>درجة العلاقة</h3>
    <ul>
      <li><b>الحد الأدنى:</b> 0 (قد لا يرتبط عنصر بأي عنصر آخر) أو 1 (كل عنصر مرتبط بعنصر واحد على الأقل).</li>
      <li><b>الحد الأعلى:</b> 1 أو N — تحدد نمط العلاقة (1:1, 1:N, M:N).</li>
    </ul>
    <div class="warn"><b>تنبيه:</b> "الاستقلالية" تعني عدم وجود تأثير للبرامج والنظم الفرعية على تراكيب البيانات — أي أن التعديلات في الاستخدامات والبرامج <b>لا يجب</b> أن تؤدي إلى تغيير تراكيب البيانات (وليس العكس).</div>

    <h2>٦) نموذج الموارد-الأحداث-الوكلاء (REA)</h2>
    <p><b>REA</b> ينظر إلى المنظمة كمكوّنة من ثلاثة أنماط كيانات:</p>
    <ul>
      <li><b>الموارد (Resources):</b> أشياء لها قيمة اقتصادية.</li>
      <li><b>الأحداث (Events):</b> أنشطة المنظمة المختلفة.</li>
      <li><b>الوكلاء (Agents):</b> الأشخاص والمنظمات.</li>
    </ul>
    <h3>قواعد العلاقات في REA</h3>
    <ul>
      <li>كل حدث يجب أن يتصل بعلاقة مع <b>مورد واحد</b> على الأقل.</li>
      <li>كل حدث يجب أن يتصل بعلاقة مع <b>حدث واحد</b> على الأقل.</li>
      <li>كل حدث يجب أن يتصل بعلاقة مع <b>وكيلين</b> على الأقل.</li>
    </ul>
    <div class="note">العلاقة بين الوكيل والحدث دوماً <span class="mono">1:N</span> — بين الموظف وطلب البيع <span class="mono">0:N</span> — بين المخزون (مورد) وطلب العميل (حدث) <span class="mono">M:N</span>.</div>
  </div>`
},

  short:'التطبيق العملي',
  html:`
  <div class="sec">
    <h2>١) أساسيات Access</h2>
    <ul>
      <li>امتداد ملفات Access: <span class="mono">.accdb</span></li>
      <li>إن لم يُحدَّد مفتاح رئيسي، ينشئ Access تلقائياً حقلاً باسم "المعرّف" بنوع "ترقيم تلقائي".</li>
      <li>النص المختصر (Short Text): حتى <b>255</b> حرفاً كحد أقصى.</li>
      <li>ملف Access الواحد يمكن أن يحتوي على <b>أكثر من جدول</b>.</li>
    </ul>

    <h2>٢) العلاقات والتكامل المرجعي</h2>
    <p>أساس علاقة الجدول هو تناظر القيم بين حقول المفاتيح (الرئيسي في جدول والأجنبي في آخر).</p>
    <div class="note"><b>التكامل المرجعي (Referential Integrity):</b> يمنع السجلات المعزولة ويحافظ على تزامن المراجع. بعد فرضه، <b>يرفض Access</b> أي عملية تنتهك علاقة الجدول (مثل حذف سجل رئيسي مرتبط بسجلات فرعية، دون تفعيل التتالي).</div>
    <table class="ref">
      <tr><th>الخيار</th><th>الأثر عند تفعيله</th></tr>
      <tr><td>تتالي تحديث الحقول المرتبطة</td><td>تحديث المفتاح الرئيسي يحدّث تلقائياً كل الحقول المرتبطة به في الجداول الأخرى</td></tr>
      <tr><td>تتالي حذف السجلات المرتبطة</td><td>حذف سجل من جانب المفتاح الرئيسي يحذف تلقائياً كل السجلات المرتبطة به</td></tr>
    </table>

    <h2>٣) الاستعلامات (Queries)</h2>
    <p>طريقتان لإنشائها: <b>عرض التصميم (Design View)</b> أو <b>SQL</b>.</p>
    <table class="ref">
      <tr><th>النوع</th><th>الوظيفة</th></tr>
      <tr><td><b>استعلامات التحديد (Select)</b></td><td>الأكثر شيوعاً — استعادة بيانات من جدول أو إجراء حسابات، لا تُعدّل مصدر البيانات فعلياً وتعرض النتائج دوماً محدّثة.</td></tr>
      <tr><td><b>استعلامات إجرائية</b></td><td>الحذف، الإضافة، التحديث — تُجري تغييرات فعلية على السجلات.</td></tr>
      <tr><td><b>استعلام المعلمات (Parameter)</b></td><td>يعرض مربع حوار يطلب من المستخدم معلومات تُعامل كمعايير بحث، دون تعديل نص الاستعلام.</td></tr>
      <tr><td><b>استعلامات التوحيد (Union)</b></td><td>تضم حقولاً من جدولين/استعلامين أو أكثر في نتيجة واحدة.</td></tr>
    </table>
    <h3>بنية استعلام SQL أساسي</h3>
    <p class="mono" style="display:block;background:var(--paper-2);padding:10px 14px;border-radius:8px;">SELECT حقل1, حقل2 FROM الجدول WHERE شرط ORDER BY حقل;</p>
    <ul>
      <li><span class="mono">DISTINCT</span> — لحذف النتائج المكررة بعد SELECT.</li>
      <li><span class="mono">ORDER BY</span> — لترتيب السجلات وفق معيار محدد.</li>
      <li><span class="mono">GROUP BY</span> — لضمّ السجلات ذات القيم المتماثلة، غالباً مع دالة حسابية.</li>
      <li><span class="mono">HAVING</span> — لتحديد شرط على السجلات <b>المجمّعة</b> بواسطة GROUP BY (بعد التجميع).</li>
      <li><span class="mono">BETWEEN...AND</span> — قيمة ضمن نطاق محدد.</li>
      <li><span class="mono">LIKE</span> — مقارنة سلسلة محارف بعامل بحث (يُستخدم مع #, *, ?).</li>
      <li><span class="mono">IN</span> — القيمة تساوي إحدى القيم في قائمة محددة.</li>
    </ul>

    <h2>٤) طرق الوصل بين الجداول (JOIN)</h2>
    <table class="ref">
      <tr><th>النوع</th><th>النتيجة</th></tr>
      <tr><td class="mono">INNER JOIN</td><td>السجلات المتطابقة فقط بين الجدولين (قيمة مشتركة بالحقل المشترك)</td></tr>
      <tr><td class="mono">LEFT JOIN</td><td>كل سجلات الجدول الأول + المطابقة فقط من الجدول الثاني</td></tr>
      <tr><td class="mono">RIGHT JOIN</td><td>كل سجلات الجدول الثاني + المطابقة فقط من الجدول الأول</td></tr>
    </table>
    <div class="note">عند عدم وجود حقل مشترك بين جدولين نريد ربطهما، نضيف <b>جدولاً وسيطاً</b> يعمل كمعبر بينهما (غالباً في علاقات M:N).</div>

    <h2>٥) النماذج (Forms) والتقارير (Reports)</h2>
    <ul>
      <li><b>نموذج مرتبط:</b> متصل مباشرة بمصدر بيانات (جدول/استعلام).</li>
      <li><b>نموذج غير مرتبط:</b> لا يرتبط بمصدر بيانات، يحوي أزرار/عناصر تحكم فقط.</li>
      <li><b>نموذج منقسم:</b> يمنح طريقتي عرض (نموذج + ورقة بيانات) لمصدر البيانات نفسه في آن واحد.</li>
      <li><b>نموذج فرعي:</b> نموذج مضمّن داخل نموذج رئيسي — مفيد لعرض علاقة واحد لمتعدد.</li>
    </ul>
    <table class="ref">
      <tr><th>طريقة العرض</th><th>الاستخدام</th></tr>
      <tr><td>عرض التخطيط (Layout)</td><td>الأكثر بديهية للتعديل — النموذج يعمل فعلياً فترى البيانات الحقيقية أثناء التعديل</td></tr>
      <tr><td>عرض التصميم (Design)</td><td>أكثر تفصيلاً لبنية النموذج (رأس/تفصيل/تذييل) — لا يعمل النموذج فعلياً أثناء التعديل</td></tr>
    </table>
    <p><b>عناصر التحكم:</b> <span class="mono">منضم</span> (مصدره حقل من جدول/استعلام) — <span class="mono">غير منضم</span> (لا مصدر بيانات، كالتسميات) — <span class="mono">محسوب</span> (مصدره تعبير/معادلة).</p>
    <h3>مقاطع التقرير</h3>
    <table class="ref">
      <tr><th>المقطع</th><th>يظهر</th></tr>
      <tr><td>رأس التقرير</td><td>مرة واحدة في بداية التقرير (عنوان، شعار، تاريخ)</td></tr>
      <tr><td>رأس الصفحة</td><td>في أعلى كل صفحة</td></tr>
      <tr><td>رأس المجموعة</td><td>في بداية كل مجموعة سجلات جديدة</td></tr>

      <tr><td>تذييل المجموعة / الصفحة / التقرير</td><td>ملخصات ومجاميع في نهاية كل مستوى</td></tr>
    </table>
  </div>`

{t:'mcq', q:'عند استخدام Find & Replace في Access/Excel للبحث عن "محمد" واستبداله بـ"أحمد" ضمن حقل نصي يحوي أيضاً القيمة "محمد أمين"، فإن النتيجة تعتمد على تفعيل خيار:', o:['"مطابقة كل محتوى الحقل" (Match whole field) أو البحث الجزئي فقط','لا يوجد أي خيار يتحكم بذلك','التكامل المرجعي فقط','Validation Rule فقط'], a:0, ex:'إن كان البحث جزئياً (بدون مطابقة كامل الحقل) سيُستبدل "محمد" في "محمد أمين" لتصبح "أحمد أمين"، أما مع تفعيل مطابقة كامل الحقل فلن يتغيّر لأنه لا يطابق "محمد" فقط.'},
];




</script>
<script>
// ============ APP STATE ============
const STORAGE_KEY = 'gbs504_progress_v1';
function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { chapters:{}, finalBest:0, finalAttempts:0 };
}
function saveProgress(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }
let state = loadProgress();
CHAPTERS.forEach(c=>{ if(!state.chapters[c.id]) state.chapters[c.id] = {read:false, bestPct:0, done:false}; });

let currentSection = 'home';
let quizState = null; // {chapterId, questions:[], idx, correctCount, answered:[]}

const PASS_PCT = 80;
const QUIZ_LEN = 12;

const EXCEL_A_CONTEXT = `
  <div class="question-data">
    <div class="context-label">بيانات العمود A المستخدمة في هذا السؤال:</div>
    <table aria-label="قيم العمود A"><tr><th>A1</th><th>A2</th><th>A3</th><th>A4</th><th>A5</th><th>A6</th><th>A7</th><th>A8</th></tr><tr><td>"أحمد"</td><td>-5</td><td>20</td><td>25</td><td>TRUE</td><td>فارغة</td><td>TRUE</td><td>FALSE</td></tr></table>
  </div>`;

// ============ UTIL ============
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function pick(arr,n){ return shuffle(arr).slice(0, Math.min(n, arr.length)); }
function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstElementChild; }
function pct(n,d){ return d? Math.round((n/d)*100) : 0; }
function formatQuestion(q){
  const usesExcelAData = /A[1-8]:A[1-8]|SUM\(A1,A5\)/.test(q.q);
  return q.q + (usesExcelAData ? EXCEL_A_CONTEXT : '');
}
function buildInlineQuestionCard(q, indexLabel){
  const wrap = el(`<div class="qcard" style="margin-bottom:16px;">
    <div class="qtag">${q.t==='text' ? 'أدخل الناتج' : 'اختر الإجابة الصحيحة'} · ${indexLabel}</div>
    <div class="qtext">${formatQuestion(q)}</div>
    <div class="ibody"></div>
  </div>`);
  const body = wrap.querySelector('.ibody');

  if(q.t==='text'){
    body.innerHTML = `<div class="numeric-row">
      <input type="text" class="txtInp" placeholder="اكتب الناتج هنا...">
      <button class="btn checkBtn">تحقق</button>
    </div><div class="feedback"></div>`;
    const input = body.querySelector('.txtInp');
    const btn = body.querySelector('.checkBtn');
    const fb = body.querySelector('.feedback');
    const check = ()=>{
      if(btn.disabled) return;
      const val = input.value.trim().replace(/\s+/g,'');
      const correct = val === String(q.a).trim();
      btn.disabled = true; input.disabled = true;
      fb.className = 'feedback show ' + (correct?'ok':'bad');
      fb.innerHTML = (correct? '✔ إجابة صحيحة! ' : `✘ غير صحيح — الإجابة الصحيحة: <b class="mono">${q.a}</b>. `) + `<br><span class="explain-label">التوضيح:</span> ${q.ex||''}`;
    };
    btn.addEventListener('click', check);
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') check(); });
  } else {
    body.innerHTML = `<div class="options">` + q.o.map((opt,i)=>
      `<div class="opt" data-i="${i}"><div class="bullet"></div><div>${opt}</div></div>`
    ).join('') + `</div><div class="feedback"></div>`;
    const fb = body.querySelector('.feedback');
    let answered = false;
    body.querySelectorAll('.opt').forEach(optEl=>{
      optEl.addEventListener('click', ()=>{
        if(answered) return;
        answered = true;
        const chosen = parseInt(optEl.dataset.i);
        const correct = chosen === q.a;
        body.querySelectorAll('.opt').forEach(o=>{
          o.classList.add('disabled');
          const i = parseInt(o.dataset.i);
          if(i===q.a) o.classList.add('correct');
          else if(i===chosen) o.classList.add('wrong');
        });
        fb.className = 'feedback show ' + (correct?'ok':'bad');
        fb.innerHTML = (correct? '✔ إجابة صحيحة! ' : '✘ غير صحيح. ') + `<br><span class="explain-label">التوضيح:</span> ${q.ex||''}`;
      });
    });
  }
  return wrap;
}
function resetProgress(){
  if(!window.confirm('هل تريد إعادة تعيين كل التقدم والنتائج المحفوظة؟')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = { chapters:{}, finalBest:0, finalAttempts:0 };
  CHAPTERS.forEach(c=>{ state.chapters[c.id] = {read:false, bestPct:0, done:false}; });
  quizState = null;
  currentSection = 'home';
  renderNav();
  renderHome();
  window.scrollTo(0,0);
}

function allChaptersDone(){ return CHAPTERS.every(c=>state.chapters[c.id].done); }
function overallProgress(){
  const total = CHAPTERS.length;
  let sum = 0;
  CHAPTERS.forEach(c=>{ sum += (state.chapters[c.id].done? 1 : (state.chapters[c.id].bestPct/100)*0.6 ); });
  return Math.round((sum/total)*100);
}

// ============ NAV RENDER ============
function renderNav(){
  const nav = document.getElementById('navlist');
  nav.innerHTML = '<div class="nav-section-label">الفصول</div>' +
    CHAPTERS.map(c=>{
      const done = state.chapters[c.id].done;
      return `<div class="navitem ${currentSection===c.id?'active':''} ${done?'done':''}" data-nav="${c.id}">
        <div class="nav-num">${c.num}</div>
        <div>${c.short}</div>
        <div class="nav-seal">✓</div>
      </div>`;
    }).join('') +
    `<div class="navitem ${currentSection==='home'?'active':''}" data-nav="home">
      <div class="nav-num">⌂</div><div>الرئيسية</div>
    </div>`;

  const nav2 = document.getElementById('navlist2');
  const finalUnlocked = allChaptersDone();
  nav2.innerHTML = `
    <div class="navitem ${currentSection==='final'?'active':''}" data-nav="final">
      <div class="nav-num">${finalUnlocked?'★':'🔒'}</div><div>امتحان شامل نهائي</div>
    </div>
    <div class="navitem ${currentSection==='bank'?'active':''}" data-nav="bank">
      <div class="nav-num">≡</div><div>بنك الأسئلة الكامل</div>
    </div>
    <div class="navitem ${currentSection==='extra'?'active':''}" data-nav="extra">
      <div class="nav-num">+</div><div>تمارين إضافية</div>
    </div>
  `;

  document.querySelectorAll('[data-nav]').forEach(n=>{
    n.addEventListener('click', ()=> go(n.dataset.nav));
  });

  document.getElementById('overallPct').textContent = overallProgress()+'%';
  document.getElementById('overallFill').style.width = overallProgress()+'%';
}

function go(section, opts){
  currentSection = section;
  quizState = null;
  renderNav();
  if(section==='home') renderHome();
  else if(section==='final') renderFinal();
  else if(section==='bank') renderBankBrowser();
  else if(section==='extra') renderExtraHub();
  else renderChapter(section, (opts&&opts.tab)||'read');
  document.getElementById('content').scrollTop = 0;
  window.scrollTo(0,0);
}

// ============ HOME ============
function renderHome(){
  document.getElementById('crumbTitle').textContent = 'الرئيسية';
  const doneCount = CHAPTERS.filter(c=>state.chapters[c.id].done).length;
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="card hero-card">
      <div class="eyebrow">GBS504 · Support Channel</div>
      <h1 class="page-title">تطبيقات حاسوبية</h1>
      <p class="lead">خمسة فصول تغطي المادة كاملة: من مفاهيم الحاسوب وأتمتة المكاتب، إلى Excel المتقدم بدواله ومراجعه، وصولاً إلى تصميم قواعد البيانات وAccess. كل فصل فيه شرح مركّز، واختبار تفاعلي، وبنك أسئلة كامل قابل للتصفح.</p>
      <div class="chips">
        <div class="chip">${doneCount}/${CHAPTERS.length} فصول مكتملة</div>
        <div class="chip">١٧١ سؤال تدريبي</div>
        <div class="chip">امتحان شامل نهائي</div>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="go('${CHAPTERS[0].id}')">بدء الفصل الأول</button>
        <button class="btn secondary" onclick="go('bank')">تصفّح بنك الأسئلة</button>
        <button class="btn ghost" onclick="resetProgress()">إعادة تعيين التقدم</button>
      </div>
    </div>
    <div class="card">
      <h2 style="margin-top:0;border:none;padding:0;">خارطة المادة</h2>
      ${CHAPTERS.map(c=>{
        const st = state.chapters[c.id];
        return `<div class="bank-item" style="cursor:pointer" onclick="go('${c.id}')">
          <div class="bank-q">
            <div>
              <div class="bank-idx">الفصل ${c.num}</div>
              <div class="bank-q-text" style="margin-top:4px;">${c.title}</div>
            </div>
            <div style="text-align:left;flex-shrink:0;">
              ${st.done? '<span style="color:var(--success);font-weight:700;">✓ مكتمل</span>' : `<span style="color:var(--muted);">${st.bestPct}%</span>`}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

// ============ EXPANDED REFERENCE FROM COURSE SUMMARY ============
const FULL_REFERENCE = {
ch1:`<div class="sec"><h2>تفصيل مرجعي موسّع</h2><h3>دور الحاسوب في المؤسسة</h3><ul><li>يعالج البيانات ويعيد تشكيل أساسيات العمل: خدمة العملاء والعمليات والإنتاج والتسويق.</li><li>تنتشر تطبيقاته عبر المؤسسة، من المكتب والمتجر حتى المخازن، وقد تُوزّع الأعمال جغرافياً على نطاق واسع.</li><li>يمتاز بالسرعة والدقة والاجتهاد (لا يتعب) والذاكرة الكبيرة؛ أما عيبه الجوهري فهو عدم امتلاكه ذكاءً ذاتياً كالإِنسان.</li></ul><h3>أتمتة المكاتب</h3><table class="ref"><tr><th>الوظيفة</th><th>المقصود</th></tr><tr><td>إنشاء المستندات</td><td>استخدام الآلات الكاتبة والحواسيب والطابعات.</td></tr><tr><td>معالجة المستندات</td><td>معالج النصوص والنشر المكتبي.</td></tr><tr><td>توزيع المستندات</td><td>إصدار الوثائق والتقارير وتحديد الجهة ووسيلة الإرسال المناسبة.</td></tr><tr><td>الأرشفة</td><td>حفظ المستندات والسجلات والبيانات بطريقة منظمة للاستخدام اللاحق.</td></tr></table><p><b>أنظمة الأتمتة:</b> إدارة المستندات، الاتصالات، المؤتمرات عن بُعد، وأنظمة الدعم.</p><h3>البرمجيات والحزم</h3><p>البرنامج سلسلة تعليمات ينفذها الحاسوب؛ والبرمجيات إجراءات أو تعليمات منطقية تُدخل إلى الذاكرة لتمكين المكوّنات المادية من أداء المهمة. تتضمن حزمة النظام: نظام التشغيل، مترجمات اللغات، والأدوات المساعدة.</p><table class="ref"><tr><th>أداة نظام</th><th>وظيفتها</th></tr><tr><td>مدير الملفات</td><td>إنشاء الملفات ونسخها وتحديثها وحذفها.</td></tr><tr><td>المحمّل Loader</td><td>تحميل شفرة الآلة للبرنامج إلى ذاكرة النظام.</td></tr><tr><td>محدد الموقع Locator</td><td>تخصيص عناوين الذاكرة للبرنامج المحمّل.</td></tr><tr><td>الرابط Linker</td><td>ربط البرامج الصغيرة (الوحدات) لتكوين برنامج واحد.</td></tr></table><h3>البرامج التطبيقية</h3><ul><li><b>عامة الأغراض:</b> ترفع إنتاجية المستخدم النهائي، مثل معالجة النصوص وجداول البيانات والعروض وقواعد البيانات.</li><li><b>مخصصة:</b> تطوّر لمستخدم محدد أو بطلب من منظمة مهنية متخصصة.</li></ul></div>`,
ch2:`<div class="sec"><h2>تفصيل مرجعي موسّع</h2><h3>جداول البيانات وExcel</h3><p>جدول البيانات أداة برمجية لإدخال الأرقام والنصوص وحسابها ومعالجتها وتحليل مجموعات البيانات. وهو شبكة من صفوف وأعمدة تظهر على الشاشة وتُخزَّن بياناتها في الذاكرة. يمكن لـExcel دعم أعمال الإدارة، الفرز والتصفية والاستعلام وإصدار تقارير تفصيلية أو ملخصة.</p><h3>المراجع في الصيغ</h3><table class="ref"><tr><th>النوع</th><th>المعنى</th><th>مثال</th></tr><tr><td>نسبي</td><td>يتغير الصف والعمود عند التعبئة التلقائية.</td><td class="mono">A1</td></tr><tr><td>مطلق</td><td>يثبّت العمود والصف معاً.</td><td class="mono">$A$2</td></tr><tr><td>مختلط</td><td>يثبّت الصف أو العمود فقط.</td><td class="mono">$A1 / A$1</td></tr></table><h3>قاعدة بيانات Excel</h3><ul><li>لكل حقل اسم مميز يختلف عن أسماء الحقول الأخرى، وتكون القائمة متصلة بلا صفوف أو أعمدة فارغة داخلها.</li><li>عند وجود أكثر من قاعدة في الورقة نفسها يجب الفصل بينها بسطر وعمود فارغين؛ والأفضل تخصيص ورقة مستقلة.</li><li>الإدخال: مباشر، عبر نموذج Form، أو بصيغ للأعمدة المحسوبة.</li></ul><h3>التحقق والبحث والتصفية</h3><table class="ref"><tr><th>الأداة</th><th>الاستخدام</th></tr><tr><td>Data Validation</td><td>تقييد نوع وقيمة الإدخال، وإظهار رسالة إرشاد أو رسالة خطأ.</td></tr><tr><td>Find / Replace</td><td>البحث والاستبدال عبر Ctrl+F وCtrl+H، مع الانتباه لخيار مطابقة كامل الحقل.</td></tr><tr><td>AutoFilter</td><td>تفعيل التصفية من قائمة Data ثم Filter؛ والتصفية المخصصة تضع معياراً لحقل.</td></tr></table><p><b>دوال مهمة:</b> الدوال المالية لتقييم الاستثمارات، ودالة TODAY للتاريخ الحالي، وSUBTOTAL للمجاميع الفرعية. تذكّر أن TRUE تعامل كـ1 وFALSE كـ0 في السياقات الحسابية المناسبة.</p></div>`,
ch3:`<div class="sec"><h2>تفصيل مرجعي موسّع</h2><h3>مفهوم DBMS ومكوّناته</h3><p>نظام إدارة قواعد البيانات حزمة برمجية تمكّن المصمم من إنشاء قاعدة البيانات وتعديلها، ومعالجة بياناتها للوصول إلى المعلومات المطلوبة. يتكوّن النظام المؤتمت من: قاعدة البيانات، البرمجيات/DBMS، التجهيزات المادية، والمستخدمين.</p><h3>اللغات والمستويات</h3><table class="ref"><tr><th>العنصر</th><th>الدور</th></tr><tr><td>DDL</td><td>تعريف البنية المنطقية للملفات والجداول والعلاقات.</td></tr><tr><td>DML</td><td>قراءة السجلات وإضافتها وتحديثها وحذفها ودمج الملفات وإجراء المعالجات.</td></tr><tr><td>المستوى الخارجي</td><td>منظور المستخدم النهائي أو مبرمج التطبيقات.</td></tr><tr><td>المستوى المنطقي</td><td>تحليل الحاجة للمعلومات وتحديد البيانات والعلاقات والتوافق والصلاحيات.</td></tr><tr><td>المستوى الفيزيائي</td><td>أماكن التخزين والفهارس ووصف السجلات وحفظ البيانات وتشفيرها.</td></tr></table><h3>أدوار العاملين</h3><ul><li><b>DBA:</b> الأمن والحماية، الاستعادة Recovery، الصلاحيات، وإعادة التنظيم وضبط الأداء.</li><li><b>محلل النظم:</b> تحديد متطلبات المستخدم وتحويلها إلى مواصفات.</li><li><b>مبرمج التطبيقات:</b> تحويل التصميم إلى قاعدة فعلية، التحقق من الصحة، وبناء واجهات الإدخال والإخراج والتقارير.</li></ul><h3>لماذا DBMS؟ ومتى لا نستخدمه؟</h3><p>يعالج مشكلات نظام الملفات التقليدي: التكرار، تبعية الملفات للتطبيقات، بطء إضافة التطبيقات، وتشتت الرقابة. ويؤمن الاستقلالية، المشاركة، ضبط التكرار، الأمن والسرية، النسخ الاحتياطي والاستعادة، التكامل والمرونة وسهولة الصيانة.</p><div class="warn">قد لا يكون مناسباً إذا كانت كلفة الإعداد كبيرة مقارنة بحجم المشروع، أو كانت البيانات والتطبيقات بسيطة، أو كانت الاستجابة الفورية جداً مطلوبة، أو لا توجد بيئة متعددة المستخدمين.</div><p><b>الأنواع:</b> هرمي، شبكي، وترابطي. يركّز المقرر على الترابطي لانتشاره وبساطته ومرونته.</p></div>`,
ch4:`<div class="sec"><h2>تفصيل مرجعي موسّع</h2><h3>النموذج الترابطي</h3><ul><li>يعرض البيانات للمستخدم في جداول، بينما يتولى النظام تفاصيل التخزين.</li><li>القيم ذرّية: لا تحتوي الخانة الواحدة على أكثر من قيمة.</li><li>الرابطة هي مجموعة أسطر/سجلات غير مرتبة، لا تتكرر أسطرها؛ والصفات/الأعمدة غير مرتبة. درجة الرابطة هي عدد أعمدتها.</li></ul><table class="ref"><tr><th>نوع المفتاح</th><th>التعريف</th></tr><tr><td>رئيسي Primary</td><td>يميّز كل سجل؛ لا يتكرر ولا يكون فارغاً، ولا تُزال صفة منه إن كان مركباً.</td></tr><tr><td>مرشح Candidate</td><td>صفة أو مجموعة صفات يمكن اختيارها لتصبح مفتاحاً رئيسياً.</td></tr><tr><td>أجنبي Foreign</td><td>حقل يشير إلى مفتاح رئيسي في جدول آخر لإقامة العلاقة.</td></tr></table><h3>العلاقات وعمليات الجبر العلائقي</h3><p>العلاقات: 1:1، و1:N، وM:N (وتحتاج الأخيرة عادةً جدولاً وسيطاً). العمليات: UNION للاتحاد، INTERSECTION للتقاطع، DIFFERENCE للفرق، JOIN للوصل، RESTRICTION لاختيار السجلات بشرط، وPROJECTION لاختيار الأعمدة.</p><h3>التصميم وERM</h3><p>التصميم المنطقي يحوّل واقع العمل إلى نموذج بيانات، ثم يحوّل التصميم الفيزيائي ذلك النموذج إلى ملفات باستخدام DDL. في ERM: الكيان شيء مادي أو مجرد مهم للمنظمة، والصفة خاصية تصفه، والعلاقة رابط منطقي، وDomain مجموعة القيم الممكنة للصفة. أهداف البناء: منع التكرار والتناقض، التكامل، والاستقلالية.</p><h3>REA</h3><table class="ref"><tr><th>الكيان</th><th>معناه</th></tr><tr><td>Resources</td><td>أشياء لها قيمة اقتصادية.</td></tr><tr><td>Events</td><td>أنشطة المنظمة.</td></tr><tr><td>Agents</td><td>الأشخاص والمنظمات.</td></tr></table><p>كل حدث يرتبط بمورد واحد وبحدث واحد وبوكيلين على الأقل. علاقة الوكيل بالحدث 1:N، والموظف مع طلب البيع 0:N، والمخزون مع طلب العميل M:N.</p></div>`,
ch5:`<div class="sec"><h2>تفصيل مرجعي موسّع</h2><h3>Access والعلاقات</h3><p>عند إنشاء جدول دون مفتاح رئيسي، يمكن لـAccess إنشاء حقل «المعرّف» بترقيم تلقائي وفهرس للمفتاح. يضمن التكامل المرجعي منع السجلات المعزولة وتزامن المراجع؛ وتحديث المفتاح الرئيسي أو حذفه يمكن أن يتالى إلى السجلات المرتبطة عند تفعيل الخيار المناسب.</p><h3>الاستعلامات وSQL</h3><table class="ref"><tr><th>النوع/البند</th><th>الغرض</th></tr><tr><td>SELECT / FROM</td><td>استعادة حقول من جدول أو أكثر؛ النتائج لا تُخزّن ثابتة وتُحدّث عند التشغيل.</td></tr><tr><td>WHERE</td><td>تصفية السجلات بمعيار، مع AND وOR.</td></tr><tr><td>DISTINCT / ORDER BY</td><td>إزالة التكرار / ترتيب النتائج.</td></tr><tr><td>GROUP BY / HAVING</td><td>تجميع القيم ثم وضع شرط على المجموعات.</td></tr><tr><td>BETWEEN, LIKE, IN</td><td>نطاق، مطابقة نمط، أو قائمة قيم.</td></tr><tr><td>Action Queries</td><td>حذف Delete، إضافة Append، تحديث Update.</td></tr></table><p>الدوال التجميعية: Sum وAvg وMin وMax. الاستعلام الفرعي SELECT داخل استعلام آخر ويُنفذ أولاً؛ واستعلام المعلمات يطلب من المستخدم قيمة عند التشغيل.</p><h3>الجداول الافتراضية والربط</h3><p>الجدول الافتراضي يعرض بيانات مشتقة دون تعديل الأصل، ويعزز الأمان ويتيح تسميات أو بنية عرض مناسبة. استخدم INNER JOIN للمطابق فقط، وLEFT JOIN لكل سجلات الجدول الأول مع المطابق، وRIGHT JOIN لكل سجلات الثاني مع المطابق. UNION يدمج نتائج متوافقة من مصدرين.</p><h3>النماذج والتقارير</h3><ul><li><b>النموذج المرتبط:</b> متصل بجدول أو استعلام؛ وغير المرتبط للأوامر والتسميات وعناصر التحكم.</li><li><b>النموذج المنقسم:</b> يعرض النموذج وورقة البيانات معاً؛ والنموذج الفرعي مناسب لعلاقة واحد لمتعدد.</li><li><b>Layout View:</b> تعدّل مع ظهور بيانات حقيقية. <b>Design View:</b> تحكم أكبر في الرأس والتفصيل والتذييل، لكن النموذج لا يعمل فعلياً أثناء التعديل.</li><li><b>التقارير:</b> تنسيق وتلخيص وعرض/توزيع/أرشفة البيانات؛ مصدر سجلاتها جدول أو استعلام.</li></ul><table class="ref"><tr><th>عنصر التحكم</th><th>مصدره</th></tr><tr><td>منضم Bound</td><td>حقل في جدول أو استعلام.</td></tr><tr><td>غير منضم Unbound</td><td>لا يرتبط بمصدر بيانات، مثل العنوان أو الصورة.</td></tr><tr><td>محسوب Calculated</td><td>تعبير بدلاً من حقل مباشر.</td></tr></table></div>`
};

// ============ CHAPTER VIEW ============
function renderChapter(chapterId, tab){
  const ch = CHAPTERS.find(c=>c.id===chapterId);
  document.getElementById('crumbTitle').textContent = `الفصل ${ch.num} — ${ch.title}`;
  const st = state.chapters[chapterId];
  const content = document.getElementById('content');

  const tabs = `
    <div class="btn-row" style="margin-bottom:22px;">
      <button class="btn ${tab==='read'?'':'secondary'}" onclick="renderChapter('${chapterId}','read')">📖 الشرح</button>
      <button class="btn ${tab==='quiz'?'':'secondary'}" onclick="renderChapter('${chapterId}','quiz')">📝 اختبار الفصل</button>
      <button class="btn ${tab==='full'?'':'secondary'}" onclick="renderChapter('${chapterId}','full')">≡ بنك أسئلة الفصل</button>
    </div>`;

  if(tab==='read'){
    content.innerHTML = tabs + `
      <div class="card">
        <div class="stamp ${st.done?'show':''}"><b>مكتمل</b><span>PASSED</span></div>
        <div class="eyebrow">الفصل ${ch.num}</div>
        <h1 class="page-title" style="font-size:28px;">${ch.title}</h1>
         ${ch.html}
         ${FULL_REFERENCE[chapterId] || ''}
        <div class="btn-row">
          <button class="btn" onclick="renderChapter('${chapterId}','quiz')">ابدأ اختبار الفصل →</button>
        </div>
      </div>`;
    state.chapters[chapterId].read = true; saveProgress();
    return;
  }

  if(tab==='full'){
    const bankQs = BANK[chapterId] || [];
    content.innerHTML = tabs + `
      <div class="card">
        <div class="eyebrow">بنك أسئلة الفصل ${ch.num}</div>
        <h1 class="page-title" style="font-size:26px;">كل أسئلة هذا الفصل (${bankQs.length})</h1>
        <p class="lead" style="margin-bottom:18px;">هذه كل أسئلة هذا الفصل بصيغة اختيار من متعدد (أو صح/خطأ) — اختر إجابتك على كل سؤال ليظهر لك صحيح كانت أم خاطئة مع التوضيح.</p>
        <div id="fullBankList"></div>
      </div>`;
    const list = document.getElementById('fullBankList');
    bankQs.forEach((q,i)=>{
      list.appendChild(buildInlineQuestionCard(q, `#${i+1}`));
    });
    return;
  }

  if(tab==='quiz'){
    startQuiz(chapterId);
  }
}

// ============ QUIZ ENGINE ============
function startQuiz(chapterId){
  const pool = (BANK[chapterId]||[]).concat(EXTRA[chapterId]||[]);
  const qs = pick(pool, Math.min(QUIZ_LEN, pool.length));
  quizState = { chapterId, questions: qs, idx:0, correctCount:0, answered:new Array(qs.length).fill(false) };
  renderQuizQuestion();
}

function renderQuizQuestion(){
  const ch = CHAPTERS.find(c=>c.id===quizState.chapterId);
  const content = document.getElementById('content');
  const q = quizState.questions[quizState.idx];
  const total = quizState.questions.length;

  content.innerHTML = `
    <div class="btn-row" style="margin-bottom:18px;">
      <button class="btn secondary" onclick="renderChapter('${ch.id}','read')">📖 الشرح</button>
      <button class="btn" onclick="renderChapter('${ch.id}','quiz')">📝 اختبار الفصل</button>
      <button class="btn secondary" onclick="renderChapter('${ch.id}','full')">≡ بنك أسئلة الفصل</button>
    </div>
    <div class="quiz-meta">
      <div class="quiz-progress">اختبار الفصل ${ch.num} — ${ch.title}</div>
      <div class="q-counter">سؤال <span id="qNum">${quizState.idx+1}</span> / ${total}</div>
    </div>
    <div class="qcard" id="qcard"></div>
  `;
  renderQuestionCard(document.getElementById('qcard'), q, onQuizAnswer);
}

function renderQuestionCard(container, q, onAnswer){
  container.innerHTML = `
    <div class="qtag">${q.t==='text'? 'أدخل الناتج' : 'اختر الإجابة الصحيحة'}</div>
    <div class="qtext">${formatQuestion(q)}</div>
    <div id="qbody"></div>
    <div class="feedback" id="fb"></div>
  `;
  const body = container.querySelector('#qbody');
  const fb = container.querySelector('#fb');

  if(q.t==='text'){
    body.innerHTML = `<div class="numeric-row">
      <input type="text" id="txtInput" placeholder="اكتب الناتج هنا...">
      <button class="btn" id="submitTxt">تحقق</button>
    </div>`;
    const input = body.querySelector('#txtInput');
    const submit = body.querySelector('#submitTxt');
    const submitFn = ()=>{
      if(submit.disabled) return;
      const val = input.value.trim().replace(/\s+/g,'');
      const correct = val === String(q.a).trim();
      submit.disabled = true; input.disabled = true;
      fb.className = 'feedback show ' + (correct?'ok':'bad');
      fb.innerHTML = (correct? '✔ إجابة صحيحة! ' : `✘ غير صحيح — الإجابة الصحيحة: <b class="mono">${q.a}</b>. `) + `<br><span class="explain-label">التوضيح:</span> ${q.ex||''}`;
      onAnswer(correct);
    };
    submit.addEventListener('click', submitFn);
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') submitFn(); });
  } else {
    body.innerHTML = `<div class="options">` + q.o.map((opt,i)=>
      `<div class="opt" data-i="${i}"><div class="bullet"></div><div>${opt}</div></div>`
    ).join('') + `</div>`;
    let answered = false;
    body.querySelectorAll('.opt').forEach(optEl=>{
      optEl.addEventListener('click', ()=>{
        if(answered) return;
        answered = true;
        const chosen = parseInt(optEl.dataset.i);
        const correct = chosen === q.a;
        body.querySelectorAll('.opt').forEach(o=>{
          o.classList.add('disabled');
          const i = parseInt(o.dataset.i);
          if(i===q.a) o.classList.add('correct');
          else if(i===chosen) o.classList.add('wrong');
        });
        fb.className = 'feedback show ' + (correct?'ok':'bad');
        fb.innerHTML = (correct? '✔ إجابة صحيحة! ' : '✘ غير صحيح. ') + `<br><span class="explain-label">التوضيح:</span> ${q.ex||''}`;
        onAnswer(correct);
      });
    });
  }
}

function onQuizAnswer(correct){
  if(correct) quizState.correctCount++;
  quizState.answered[quizState.idx] = true;
  const isLast = quizState.idx === quizState.questions.length-1;
  const qcard = document.getElementById('qcard');
  const nextBtn = el(`<div class="btn-row"><button class="btn" id="nextQ">${isLast? 'عرض النتيجة النهائية →' : 'السؤال التالي →'}</button></div>`);
  qcard.appendChild(nextBtn);
  document.getElementById('nextQ').addEventListener('click', ()=>{
    if(isLast) finishQuiz();
    else { quizState.idx++; renderQuizQuestion(); }
  });
}

function finishQuiz(){
  const ch = CHAPTERS.find(c=>c.id===quizState.chapterId);
  const total = quizState.questions.length;
  const scorePct = pct(quizState.correctCount, total);
  const st = state.chapters[ch.id];
  st.bestPct = Math.max(st.bestPct, scorePct);
  if(scorePct >= PASS_PCT) st.done = true;
  saveProgress();
  renderNav();

  const passed = scorePct >= PASS_PCT;
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="card result-card">
      <div class="stamp ${passed?'show':''}"><b>ناجح</b><span>PASSED</span></div>
      <div class="eyebrow">نتيجة اختبار الفصل ${ch.num}</div>
      <div class="result-score">${scorePct}<span>%</span></div>
      <div class="result-msg">${quizState.correctCount} من ${total} إجابات صحيحة</div>
      <p class="lead" style="margin-top:10px;">${passed
        ? 'أحسنت! تجاوزت نسبة النجاح (٨٠٪) — الفصل الآن مكتمل ومختوم في القائمة الجانبية.'
        : `تحتاج ٨٠٪ فأكثر لختم هذا الفصل كمكتمل. راجع الشرح مرة أخرى وأعد المحاولة — التكرار هو أساس الحفظ في هذه المادة.`}</p>
      <div class="btn-row" style="justify-content:center;">
        <button class="btn" onclick="startQuiz('${ch.id}'); go('${ch.id}',{tab:'quiz'}); renderQuizQuestion();">إعادة الاختبار (أسئلة جديدة)</button>
        <button class="btn secondary" onclick="renderChapter('${ch.id}','read')">مراجعة الشرح</button>
        ${allChaptersDone() ? `<button class="btn ghost" onclick="go('final')">الانتقال للامتحان الشامل ★</button>` : ''}
      </div>
    </div>
  `;
}

// ============ FINAL EXAM ============
function renderFinal(){
  document.getElementById('crumbTitle').textContent = 'الامتحان الشامل النهائي';
  const content = document.getElementById('content');
  const unlocked = allChaptersDone();

  if(!unlocked){
    const remaining = CHAPTERS.filter(c=>!state.chapters[c.id].done);
    content.innerHTML = `
      <div class="card lock-card">
        <div class="lock-icon">🔒</div>
        <h1 class="page-title" style="font-size:26px;">الامتحان الشامل مقفول بعد</h1>
        <p class="lead">لازم تكمّل وتنجح (٨٠٪ فأكثر) باختبار كل فصل قبل ما تفتح الامتحان الشامل النهائي.</p>
        <div class="chips" style="justify-content:center;">
          ${remaining.map(c=>`<div class="chip">الفصل ${c.num}: ${c.short}</div>`).join('')}
        </div>
        <div class="btn-row" style="justify-content:center;margin-top:20px;">
          <button class="btn" onclick="go('${remaining[0].id}')">الذهاب للفصل ${remaining[0].num}</button>
        </div>
      </div>`;
    return;
  }

  content.innerHTML = `
    <div class="card">
      <div class="eyebrow">تقييم شامل · ٥٠ سؤال</div>
      <h1 class="page-title" style="font-size:28px;">الامتحان الشامل النهائي</h1>
      <p class="lead">امتحان يجمع أسئلة من كل الفصول الخمسة، مُختارة عشوائياً من بنك الأسئلة الكامل (١٧١ سؤال). كل محاولة تعرض تشكيلة مختلفة — أعد المحاولة عدة مرات لتغطية كل الأسئلة تدريجياً.</p>
      <div class="chips">
        <div class="chip">أفضل نتيجة سابقة: ${state.finalBest}%</div>
        <div class="chip">عدد المحاولات: ${state.finalAttempts}</div>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="startFinal()">ابدأ الامتحان الشامل</button>
      </div>
    </div>`;
}

function startFinal(){
  const allBank = [];
  CHAPTERS.forEach(c=> allBank.push(...(BANK[c.id]||[]).map(q=>({...q, __ch:c.num}))) );
  const qs = pick(allBank, Math.min(50, allBank.length));
  quizState = { chapterId:'final', questions: qs, idx:0, correctCount:0, answered:new Array(qs.length).fill(false) };
  renderFinalQuestion();
}

function renderFinalQuestion(){
  const content = document.getElementById('content');
  const q = quizState.questions[quizState.idx];
  const total = quizState.questions.length;
  content.innerHTML = `
    <div class="quiz-meta">
      <div class="quiz-progress">الامتحان الشامل النهائي — سؤال من الفصل ${q.__ch}</div>
      <div class="q-counter">سؤال <span id="qNum">${quizState.idx+1}</span> / ${total}</div>
    </div>
    <div class="qcard" id="qcard"></div>
  `;
  renderQuestionCard(document.getElementById('qcard'), q, onFinalAnswer);
}

function onFinalAnswer(correct){
  if(correct) quizState.correctCount++;
  const isLast = quizState.idx === quizState.questions.length-1;
  const qcard = document.getElementById('qcard');
  const nextBtn = el(`<div class="btn-row"><button class="btn" id="nextQ">${isLast? 'عرض النتيجة النهائية →' : 'السؤال التالي →'}</button></div>`);
  qcard.appendChild(nextBtn);
  document.getElementById('nextQ').addEventListener('click', ()=>{
    if(isLast) finishFinal();
    else { quizState.idx++; renderFinalQuestion(); }
  });
}

function finishFinal(){
  const total = quizState.questions.length;
  const scorePct = pct(quizState.correctCount, total);
  state.finalAttempts++;
  state.finalBest = Math.max(state.finalBest, scorePct);
  saveProgress();
  renderNav();

  let grade, gradeColor;
  if(scorePct>=90){grade='ممتاز';gradeColor='var(--success)';}
  else if(scorePct>=80){grade='جيد جداً';gradeColor='var(--success)';}
  else if(scorePct>=65){grade='جيد';gradeColor='var(--brass-deep)';}
  else {grade='يحتاج مراجعة';gradeColor='var(--danger)';}

  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="card result-card">
      <div class="eyebrow">نتيجة الامتحان الشامل</div>
      <div class="result-score" style="color:${gradeColor}">${scorePct}<span>%</span></div>
      <div class="result-msg">${quizState.correctCount} من ${total} إجابات صحيحة — <b style="color:${gradeColor}">${grade}</b></div>
      <p class="lead" style="margin-top:10px;">أفضل نتيجة لك حتى الآن: <b>${state.finalBest}%</b> عبر ${state.finalAttempts} محاولة/محاولات. كل محاولة تسحب أسئلة مختلفة من البنك — أعد المحاولة لتغطي أكبر عدد من الأسئلة وترسّخ المادة.</p>
      <div class="btn-row" style="justify-content:center;">
        <button class="btn" onclick="startFinal(); go('final'); renderFinalQuestion();">محاولة جديدة</button>
        <button class="btn secondary" onclick="go('bank')">مراجعة بنك الأسئلة الكامل</button>
      </div>
    </div>`;
}

// ============ FULL BANK BROWSER ============
function renderBankBrowser(activeChapter){
  document.getElementById('crumbTitle').textContent = 'بنك الأسئلة الكامل';
  activeChapter = activeChapter || 'all';
  const content = document.getElementById('content');
  const totalCount = Object.values(BANK).reduce((s,a)=>s+a.length,0);

  content.innerHTML = `
    <div class="card">
      <div class="eyebrow">مرجع شامل</div>
      <h1 class="page-title" style="font-size:28px;">بنك الأسئلة الكامل (${totalCount} سؤال)</h1>
      <p class="lead">كل الأسئلة المستخرجة من ملفات بنك الأسئلة للدورات السابقة، مصنّفة حسب الفصل، بصيغة اختيار من متعدد (أو صح/خطأ) — اختر إجابتك على كل سؤال ليظهر لك صحيح كانت أم خاطئة.</p>
      <div class="bank-filter" id="bankFilter">
        <button class="filter-btn ${activeChapter==='all'?'active':''}" data-f="all">الكل (${totalCount})</button>
        ${CHAPTERS.map(c=>`<button class="filter-btn ${activeChapter===c.id?'active':''}" data-f="${c.id}">ف${c.num} · ${c.short} (${BANK[c.id].length})</button>`).join('')}
      </div>
      <div id="bankListAll"></div>
    </div>`;

  function draw(filter){
    const listEl = document.getElementById('bankListAll');
    listEl.innerHTML = '';
    const chaptersToShow = filter==='all'? CHAPTERS : CHAPTERS.filter(c=>c.id===filter);
    chaptersToShow.forEach(c=>{
      const group = el(`<div style="margin-bottom:10px;"><h3 style="margin-top:22px;">الفصل ${c.num} — ${c.title}</h3></div>`);
      listEl.appendChild(group);
      BANK[c.id].forEach((q,i)=>{
        listEl.appendChild(buildInlineQuestionCard(q, `ف${c.num} #${i+1}`));
      });
    });
  }
  draw(activeChapter);
  document.querySelectorAll('#bankFilter .filter-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('#bankFilter .filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      draw(btn.dataset.f);
    });
  });
}

// ============ EXTRA HUB ============
function renderExtraHub(){
  document.getElementById('crumbTitle').textContent = 'تمارين إضافية';
  const totalExtra = Object.values(EXTRA).reduce((s,a)=>s+a.length,0);
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="card">
      <div class="eyebrow">تحدٍ إضافي</div>
      <h1 class="page-title" style="font-size:28px;">تمارين إضافية (${totalExtra} سؤال)</h1>
      <p class="lead">أسئلة إضافية أُنشئت خصيصاً لتوسيع تدريبك بعد إنهاء بنك الأسئلة الأصلي — بنفس نمط الأسئلة الامتحانية لكل فصل. اختر فصلاً لتجربة اختبار قصير من هذه الأسئلة فقط.</p>
      <div class="bank-filter">
        ${CHAPTERS.map(c=>`<button class="filter-btn" data-c="${c.id}">ف${c.num} · ${c.short} (${EXTRA[c.id].length})</button>`).join('')}
      </div>
    </div>
    <div id="extraArea"></div>`;
  document.querySelectorAll('.bank-filter .filter-btn[data-c]').forEach(btn=>{
    btn.addEventListener('click', ()=> startExtraQuiz(btn.dataset.c));
  });
}

function startExtraQuiz(chapterId){
  const ch = CHAPTERS.find(c=>c.id===chapterId);
  const qs = shuffle(EXTRA[chapterId]);
  quizState = { chapterId:'extra-'+chapterId, questions: qs, idx:0, correctCount:0, answered:new Array(qs.length).fill(false) };
  renderExtraQuestion(ch);
}

function renderExtraQuestion(ch){
  const content = document.getElementById('content');
  const q = quizState.questions[quizState.idx];
  const total = quizState.questions.length;
  content.innerHTML = `
    <div class="quiz-meta">
      <div class="quiz-progress">تمارين إضافية — ${ch.title}</div>
      <div class="q-counter">سؤال <span id="qNum">${quizState.idx+1}</span> / ${total}</div>
    </div>
    <div class="qcard" id="qcard"></div>
  `;
  renderQuestionCard(document.getElementById('qcard'), q, (correct)=>{
    if(correct) quizState.correctCount++;
    const isLast = quizState.idx === quizState.questions.length-1;
    const qcard = document.getElementById('qcard');
    const nextBtn = el(`<div class="btn-row"><button class="btn" id="nextQ">${isLast? 'إنهاء' : 'السؤال التالي →'}</button></div>`);
    qcard.appendChild(nextBtn);
    document.getElementById('nextQ').addEventListener('click', ()=>{
      if(isLast){
        const scorePct = pct(quizState.correctCount, total);
        document.getElementById('content').innerHTML = `
          <div class="card result-card">
            <div class="eyebrow">نتيجة التمرين الإضافي</div>
            <div class="result-score">${scorePct}<span>%</span></div>
            <div class="result-msg">${quizState.correctCount} من ${total} إجابات صحيحة</div>
            <div class="btn-row" style="justify-content:center;">
              <button class="btn" onclick="startExtraQuiz('${ch.id}')">إعادة المحاولة</button>
              <button class="btn secondary" onclick="go('extra')">رجوع للتمارين الإضافية</button>
            </div>
          </div>`;
      } else { quizState.idx++; renderExtraQuestion(ch); }
    });
  });
}

// ============ INIT ============
renderNav();
renderHome();

</script>
</body>
</html>
